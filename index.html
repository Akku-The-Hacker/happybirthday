<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Eternal Story</title>
    <link rel="stylesheet" href="css/index.css">
    <!-- Playfair for Serifs, Poppins for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Cinematic Background Layers -->
    <div class="bg-wrapper">
        <div class="bg-image"></div>
        <div class="vignette"></div>
        <div class="gradient-overlay"></div>
    </div>
    
    <div class="sparkles" id="sparkles"></div>

    <main class="lock-screen" id="lock-screen">
        
        <!-- TOP SECTION: Hero Text -->
        <header class="hero-area">
            <h1 class="entry-title">An Eternal Story Begins… ✨</h1>
        </header>

        <!-- CENTER SECTION: Emotional Anchor -->
        <article class="poem-area">
            <p class="hindi-line shimmer">
                तेरा कुछ पल का आना… 🌸<br>
                मुझे हर पल तेरा कर जाता है 💖✨
            </p>
        </article>

        <!-- PIN SECTION: Indicators & Input -->
        <section class="auth-area">
            <div class="pin-indicators" id="pin-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <p class="hint-text" id="status-msg">Enter our little secret… ✨</p>

            <div class="numpad">
                <button onclick="append(1)">1</button>
                <button onclick="append(2)">2</button>
                <button onclick="append(3)">3</button>
                <button onclick="append(4)">4</button>
                <button onclick="append(5)">5</button>
                <button onclick="append(6)">6</button>
                <button onclick="append(7)">7</button>
                <button onclick="append(8)">8</button>
                <button onclick="append(9)">9</button>
                <div class="empty"></div>
                <button onclick="append(0)">0</button>
                <button class="del" onclick="backspace()">⌫</button>
            </div>
        </section>

    </main>

    <script src="js/index.js"></script>
</body>
</html>
