<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrance | For Shona</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-container">
        <div class="bg-image" id="bgImage"></div>
        <div class="radial-focus"></div>
    </div>

    <main class="ui-wrapper" id="mainUI">
        <h1 class="main-title">An Eternal Story Begins… ✨</h1>

        <article class="poem-center">
            <p class="hindi-shimmer">
                तेरा कुछ पल का आना… 🌸<br>
                मुझे हर पल तेरा कर जाता है 💖✨
            </p>
        </article>

        <section class="auth-section">
            <div class="dots-row" id="dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <p class="hint-text">Enter our little secret… 🔐</p>
            
            <div class="numpad-grid">
                <button onclick="keyPress(1)">1</button><button onclick="keyPress(2)">2</button><button onclick="keyPress(3)">3</button>
                <button onclick="keyPress(4)">4</button><button onclick="keyPress(5)">5</button><button onclick="keyPress(6)">6</button>
                <button onclick="keyPress(7)">7</button><button onclick="keyPress(8)">8</button><button onclick="keyPress(9)">9</button>
                <div class="empty"></div><button onclick="keyPress(0)">0</button><button class="del-btn" onclick="backspace()">✕</button>
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
