<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>An Eternal Story | Entry</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>
    <div class="particles" id="particles"></div>

    <main class="gate-wrapper">
        <div class="glass-card" id="main-card">
            <header class="hero-text">
                <h1 class="title">An Eternal Story Begins… <span class="heart-beat">💖</span></h1>
                <div class="shayari-container">
                    <p class="shayari">
                        “Har kahaani sabke liye nahi hoti,<br>
                        Kuch pal sirf do dilon ke liye hote hain… 💕<br>
                        <span>Agar tum sach mein meri ho,<br>
                            toh yeh darwaza khul jaayega… ✨</span>”
                    </p>
                </div>
            </header>

            <div class="pin-section">
                <div class="pin-display">
                    <div class="dot" id="dot-0"></div>
                    <div class="dot" id="dot-1"></div>
                    <div class="dot" id="dot-2"></div>
                    <div class="dot" id="dot-3"></div>
                </div>
                <p id="status-msg">Is Kahaani Ki Chaabi Sirf Tum Ho 💫<br>
                Prove It’s You… ✨</p>

                <div class="numpad">
                    <button onclick="pressKey(1)">1</button>
                    <button onclick="pressKey(2)">2</button>
                    <button onclick="pressKey(3)">3</button>
                    <button onclick="pressKey(4)">4</button>
                    <button onclick="pressKey(5)">5</button>
                    <button onclick="pressKey(6)">6</button>
                    <button onclick="pressKey(7)">7</button>
                    <button onclick="pressKey(8)">8</button>
                    <button onclick="pressKey(9)">9</button>
                    <div class="empty"></div>
                    <button onclick="pressKey(0)">0</button>
                    <button class="delete" onclick="deleteKey()">✕</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
