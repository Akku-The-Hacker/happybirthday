<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrance | For You</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Poppins:wght@300& Higgins&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    
    <main class="gate-container">
        <div class="glass-card" id="auth-card">
            <span class="heart-icon">💖</span>
            <h1>An Eternal Story</h1>
            <p>Enter the password to unlock our world.</p>
            
            <div class="input-group">
                <input type="password" id="pass-input" placeholder="Enter Password..." autocomplete="off">
                <p id="error-msg">Incorrect password, love. Try again.</p>
            </div>
            
            <button onclick="checkPassword()" id="unlock-btn">Unlock Memory</button>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
