<!-- LAYER 2: UPGRADED COUNTDOWN -->
<div id="layer2-countdown" class="layer hidden">
    <div class="countdown-container">
        <!-- Background Image & Animated Overlays -->
        <img src="images/Flower2.jpg" class="abs-img" alt="Background">
        <div class="animated-gradient-overlay"></div>
        <div id="particles-container"></div>

        <div class="countdown-content">
            <h2 class="waiting-text">Counting down to your special day...</h2>
            
            <div class="glass-timer-wrapper">
                <div class="timer-box">
                    <span id="days" class="pulse-num">00</span>
                    <label>🗓️ Days</label>
                </div>
                <div class="separator">❤️</div>
                <div class="timer-box">
                    <span id="hours" class="pulse-num">00</span>
                    <label>⏰ Hours</label>
                </div>
                <div class="separator">❤️</div>
                <div class="timer-box">
                    <span id="mins" class="pulse-num">00</span>
                    <label>✨ Mins</label>
                </div>
                <div class="separator">❤️</div>
                <div class="timer-box">
                    <span id="secs" class="pulse-num">00</span>
                    <label>💓 Secs</label>
                </div>
            </div>

            <!-- Randomized Shayari Area -->
            <div id="shayari-display" class="shayari-gradient-text"></div>
        </div>
    </div>
</div>
