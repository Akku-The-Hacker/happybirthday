<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrance | An Eternal Story</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>
    <div class="particles" id="particles"></div>

    <main class="gate-wrapper">
        <h1 class="hero-title">An Eternal Story Begins… ✨</h1>
        <p class="shayari">“Har kahaani sabke liye nahi hoti,<br>Kuch pal sirf do dilon ke liye hote hain… 💕”</p>
        
        <div class="pin-display">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <p id="status-msg">Enter our little secret… 🔐</p>

        <div class="numpad">
            <button onclick="pressKey(1)">1</button><button onclick="pressKey(2)">2</button><button onclick="pressKey(3)">3</button>
            <button onclick="pressKey(4)">4</button><button onclick="pressKey(5)">5</button><button onclick="pressKey(6)">6</button>
            <button onclick="pressKey(7)">7</button><button onclick="pressKey(8)">8</button><button onclick="pressKey(9)">9</button>
            <div class="empty"></div><button onclick="pressKey(0)">0</button><button class="del" onclick="deleteKey()">✕</button>
        </div>
    </main>

    <script src="js/index.js"></script>
</body>
</html>
