<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Shona ❤️</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="fireworks"></canvas>
    
    <!-- Hero Section -->
    <section class="st-section s-hero">
        <div class="st-overlay"></div>
        <div class="st-content"><h1>Happy Birthday Shona 💖</h1></div>
    </section>

    <!-- Shayari Reveal -->
    <section class="st-section s-shayari">
        <div class="st-overlay"></div>
        <div class="st-content"><p>“Har pal tera kar jaata hai… ✨”</p></div>
    </section>

    <!-- Letter Section -->
    <section class="st-section s-letter">
        <div class="st-overlay"></div>
        <div class="st-content">
            <h2>For You, Always</h2>
            <p>Today is a celebration of the person who makes every ordinary day feel like a beautiful dream.</p>
        </div>
    </section>

    <!-- Memory Reveal -->
    <section class="st-section s-memory">
        <div class="st-overlay"></div>
        <div class="st-content">
            <p>A secret mark of us...</p>
            <img src="images/Hikkey.jpg" class="tap-reveal" onclick="this.classList.toggle('clear')">
        </div>
    </section>

    <!-- Final Signature -->
    <section class="st-section s-signature">
        <div class="st-overlay"></div>
        <div class="st-content"><h2>Our Forever Story ❤️</h2><p>– Yours truly, Akki</p></div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
