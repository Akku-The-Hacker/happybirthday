<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Shona | Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,600;1,700;1,800&family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --s1-color: linear-gradient(135deg, #fff 10%, #ffafbd 40%, #ffd700 70%, #fff 100%);
            --stylish-mix: linear-gradient(45deg, #ff9ecb, #fcf6ba, #ff9ecb, #d4af37);
            --royal-gold: linear-gradient(to bottom, #fcf6ba, #bf953f);
        }

        * { margin:0; padding:0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        section { 
            position: relative; width: 100%; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 80px 0; text-align: center; overflow: hidden;
        }

        .media-bg { position: absolute; inset:0; z-index: -2; background-size: cover; background-position: center; transition: 0.5s; }
        .content-wrap { position: relative; z-index: 10; width: 100%; padding: 0 25px; }

        /* S1: TEXT DESIGN - Soft Stylish Rose Gold */
        .s1-text { 
            font-family: 'Playfair Display', serif; font-style: italic; font-weight: 800; font-size: 1.8rem; line-height: 1.6;
            background: var(--s1-color); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.8)); min-height: 400px;
        }

        /* OTHERS */
        .header-top-right { position: absolute; top: 40px; right: 25px; font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #FCF6BA; }
        .fill-text { font-family: 'Playfair Display', serif; font-size: 2.2rem; line-height: 1.4; font-weight: 700; margin-bottom: 20px; min-height: 100px;}
        .highlight { background: linear-gradient(to right, #ffafbd, #ffc3a0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* PHOTO BOX - Horizontal Aspect Ratio */
        .reveal-frame { 
            position: relative; width: 100vw; height: 300px; margin: 25px 0; background: #111; overflow: hidden; cursor: pointer; border-top: 1px solid rgba(255,255,255,0.2); border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .reveal-frame img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; filter: blur(50px); transition: 1.5s; }
        .reveal-frame.active img { filter: blur(0); }
        .tap-msg { position: absolute; inset:0; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 4px; color: #fff; background: rgba(0,0,0,0.4); }

        /* STYLISH GRADIENT TEXT FOR S4, S5, S6 */
        .colorful-font {
            font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700;
            background: var(--stylish-mix); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); background-size: 200% auto; animation: textMove 5s infinite linear;
        }
        @keyframes textMove { to { background-position: 200% center; } }

        /* S5 NICKNAMES - POP OF COLOR */
        .nick-box { margin: 20px 0; opacity: 0; transition: 2s ease; }
        .nick-box.visible { opacity: 1; }
        .nick-box span { display: block; font-size: 2.1rem; font-weight: 900; margin: 8px 0; font-family: 'Playfair Display', serif; }

        /* S6: MEGA SIGNATURE (KING SIZE) */
        .signature-box h2 { 
            font-family: 'Great Vibes', cursive; font-size: 6rem; /* Huge Size */
            background: var(--royal-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px gold); margin-top: 20px; animation: glowPulse 2s infinite alternate;
        }
        @keyframes glowPulse { from { filter: drop-shadow(0 0 10px gold); } to { filter: drop-shadow(0 0 25px #ffafbd); } }

        /* MUSIC TOGGLE */
        #music-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: white; text-shadow: 0 0 10px #000;}

        /* Typewriter Cursor */
        .typing::after { content: '|'; animation: blinkCursor 0.8s infinite; color: #fff; }
        @keyframes blinkCursor { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="yt-container"></div>
    <button id="music-toggle" onclick="toggleMainMusic()">🎵</button>

    <!-- 1️⃣ HERO (Updated Clean BG & Message) -->
    <section data-type="type-s1">
        <div class="media-bg" style="background-image: url('images/Handhold.jpg'); filter: brightness(0.65);"></div>
        <div class="content-wrap">
            <h1 class="s1-text typing" id="text-s1"></h1>
        </div>
    </section>

    <!-- 2️⃣ TEA -->
    <section data-type="type-s2">
        <div id="star-layer" style="position:absolute; inset:0;"></div>
        <div class="media-bg" style="background-image: url('images/Tea.jpg'); filter: brightness(0.3);"></div>
        <h2 class="header-top-right">Chai aur Tum</h2>
        <div class="content-wrap">
            <p class="fill-text typing" id="text-s2"></p>
            <p class="fill-text highlight typing" id="text-s2-hl"></p>
        </div>
    </section>

    <!-- 3️⃣ TOGETHER -->
    <section data-type="type-s3">
        <div id="heart-layer" style="position:absolute; inset:0;"></div>
        <div class="media-bg" style="background-image: url('images/HandonHand.jpg'); filter: brightness(0.35);"></div>
        <div class="content-wrap">
            <p class="fill-text typing" id="text-s3"></p>
            <p class="fill-text highlight typing" id="text-s3-hl"></p>
        </div>
    </section>

    <!-- 4️⃣ HICKEY REVEAL -->
    <section data-type="type-s4">
        <div class="content-wrap">
            <p style="color:#FFD700; margin-bottom:10px; font-style:italic;">“A private secret, meant only for us… 🌹”</p>
            <div class="reveal-frame" onclick="this.classList.toggle('active')">
                <img src="images/Hikkey.jpg">
                <div class="tap-msg">TAP TO UNLOCK MEMORY</div>
            </div>
            <p class="colorful-font typing" id="text-s4" style="font-size:1.6rem;"></p>
        </div>
    </section>

    <!-- 5️⃣ NICKNAMES (STYLISH MESSAGES) -->
    <section data-type="type-s5">
        <div class="media-bg" style="background-image: url('images/Flower2.jpg'); filter: brightness(0.25);"></div>
        <div class="content-wrap">
            <h2 class="colorful-font typing" id="text-s5-title" style="font-size: 2.1rem; min-height: 120px;"></h2>
            
            <div class="nick-box" id="nick-reveal">
                <span style="color: #a1c4fd;">Mera Betu… 💙</span>
                <span style="color: #ffafbd;">Meri Shona… 💖</span>
                <span style="color: #ffd1dc;">Meri Lado… 🌹</span>
                <span style="color: #fff;">Mera Babu… 🤍</span>
                <span style="color: #ffd700;">Mera Sabkuch… 💍✨</span>
            </div>

            <div class="long-confession">
                <p class="colorful-font typing" id="text-s5-p1" style="font-size:1.3rem; margin-bottom:10px;"></p>
                <p class="colorful-font typing" id="text-s5-p2" style="font-size:1.7rem; font-weight:900;"></p>
            </div>
        </div>
    </section>

    <!-- 6️⃣ FINALE (CENTERED SIGNATURE + FIREWORKS) -->
    <section data-type="type-s6" id="final-page">
        <canvas id="fw-canvas-s6" style="position:absolute; inset:0; z-index:1;"></canvas>
        <div class="content-wrap" style="display:flex; flex-direction:column; align-items:center;">
            <div class="reveal-frame" onclick="this.classList.toggle('active')">
                <img src="images/Name.jpg">
                <div class="tap-msg">REVEAL FOREVER</div>
            </div>
            <div class="signature-box" style="margin-top:20px;">
                <p id="text-s6-msg" class="colorful-font typing" style="font-size:1.8rem;"></p>
                <p style="margin-top:50px; opacity:0.8; font-size:1.4rem;">Only Yours,</p>
                <h2 id="text-s6-name" class="typing"></h2>
            </div>
        </div>
    </section>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- 🎵 IMPROVED MUSIC ENGINE ---
        let player;
        const SONG_ID = "orYf6VDtj_k";

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-container', {
                height: '0', width: '0', videoId: SONG_ID,
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': SONG_ID, 'controls': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(e) {
            e.target.setVolume(45);
            e.target.playVideo();
            // Force play on first tap (browser hack)
            const forcePlay = () => { if(player.getPlayerState() !== 1) player.playVideo(); };
            document.addEventListener('click', forcePlay, { once: true });
            document.addEventListener('scroll', forcePlay, { once: true });
        }

        function toggleMainMusic() {
            if(player.getPlayerState() === 1) player.pauseVideo();
            else player.playVideo();
        }

        // --- ✍️ TYPEWRITER DATABASE ---
        const MESSAGES = {
            "text-s1": `Wish you a very, very Happy Birthday, Baccha… 🎂💖✨\nAaj ka din mere liye sirf ek date nahi, ek ehsaas hai… 🌸\nTum ho toh meri duniya mein roshni hai, warna sab kuch adhura sa lagta hai… 💫\nMay life always hold you gently and give you more than you ever dream of… 🤍\nTum meri muskaan ho, meri dua ho, meri sabse khoobsurat wajah ho… 🌹\nStay happy, stay mine… always. 💞✨`,
            "text-s2": "चाय की वो छोटी सी प्याली, \n और सामने बैठी तुम… ☕🌸",
            "text-s2-hl": "तुम साथ ho, तो हर लम्हा खास hai… 💖✨",
            "text-s3": "हाथों की ये पकड़ बस आज की नहीं… 🤍",
            "text-s3-hl": "मैं हमेशा तुम्हारे साथ रहूँगा… 💖✨",
            "text-s4": "ये बस एक निशान नहीं… मोहब्बत की वो अनकही कहानी hai। 💞✨",
            "text-s5-title": "Wishing You a Very Very Happy Birthday, Baccha… 🎂❤️",
            "text-s5-p1": "Tum sirf meri mohabbat nahi ho… tum meri zarurat ho 💞 sukoon ho 🌙 dhadkan ho 💓 Aur shayad meri takdeer bhi… 🌟",
            "text-s5-p2": "I Love You beyond words. Bas tum hi ho. 🤍✨",
            "text-s6-msg": "हर जन्म में, बस तुम ही मेरी कहानी रहना… 💖",
            "text-s6-name": "Akki 🤍"
        };

        async function typewriter(id) {
            const el = document.getElementById(id);
            if (!el || el.dataset.ran) return;
            el.dataset.ran = "true";
            const text = MESSAGES[id];
            for (let i = 0; i < text.length; i++) {
                if (text[i] === "\n") el.innerHTML += "<br>";
                else el.innerHTML += text[i];
                await new Promise(r => setTimeout(r, 55));
            }
            el.classList.remove('typing');
            if (id === 'text-s5-title') document.getElementById('nick-reveal').classList.add('visible');
        }

        // Intersection Observer (Dramatic Triggers)
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    const sec = e.target.dataset.type;
                    if(sec === 'type-s1') typewriter('text-s1');
                    if(sec === 'type-s2') typewriter('text-s2').then(()=>typewriter('text-s2-hl'));
                    if(sec === 'type-s3') typewriter('text-s3').then(()=>typewriter('text-s3-hl'));
                    if(sec === 'type-s4') typewriter('text-s4');
                    if(sec === 'type-s5') typewriter('text-s5-title').then(()=>typewriter('text-s5-p1')).then(()=>typewriter('text-s5-p2'));
                    if(sec === 'type-s6') { startS6FW(); typewriter('text-s6-msg').then(()=>typewriter('text-s6-name')); }
                }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('section').forEach(s => obs.observe(s));

        // FX Engines (Stars & Hearts)
        for(let i=0;i<40;i++) {
            let s=document.createElement('div');
            s.style.cssText=`position:absolute;width:2px;height:2px;background:#fff;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:twinkle ${2+Math.random()*3}s infinite;`;
            document.getElementById('star-layer').appendChild(s);
        }
        for(let i=0;i<8;i++){
            let h=document.createElement('div'); h.innerHTML="💖";
            h.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:fUp ${5+Math.random()*5}s infinite linear;opacity:0.3;font-size:25px;`;
            document.getElementById('heart-layer').appendChild(h);
        }

        function startS6FW() {
            const cv = document.getElementById('fw-canvas-s6');
            const cx = cv.getContext('2d');
            cv.width = window.innerWidth; cv.height = window.innerHeight;
            function draw(){
                cx.fillStyle = 'rgba(0,0,0,0.1)'; cx.fillRect(0,0,cv.width,cv.height);
                for(let i=0;i<5;i++){
                    cx.fillStyle=`hsl(${Math.random()*360},100%,70%)`;
                    cx.beginPath();cx.arc(Math.random()*cv.width,Math.random()*cv.height,1.3,0,Math.PI*2);cx.fill();
                } requestAnimationFrame(draw);
            } draw();
        }

        const styles = document.createElement('style');
        styles.innerHTML=`@keyframes twinkle{50%{opacity:0.2}} @keyframes fUp{from{transform:translateY(100vh)}to{transform:translateY(-10vh);opacity:0}}`;
        document.head.appendChild(styles);

    </script>
</body>
</html>
