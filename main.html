<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Shona | Happy Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bright-gold: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --royal-color: linear-gradient(to right, #ffafbd, #ffc3a0, #ffafbd);
            --luxury-mix: linear-gradient(45deg, #FFD700, #FFF, #FF69B4, #87CEEB);
        }

        * { margin:0; padding:0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        section { 
            position: relative; width: 100%; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 80px 0; text-align: center; overflow: hidden;
        }

        .media-bg { position: absolute; inset:0; z-index: -2; background-size: cover; background-position: center; filter: brightness(0.35); }
        .content-wrap { position: relative; z-index: 10; width: 100%; padding: 0 20px; }

        /* Typography Styles (Strictly as before) */
        .s1-text { 
            font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700;
            background: var(--bright-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1.5; min-height: 250px;
        }
        canvas { position: absolute; inset:0; z-index: -1; }

        .header-top-right { position: absolute; top: 40px; right: 25px; font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: #FCF6BA; }
        .fill-text { font-family: 'Playfair Display', serif; font-size: 2.2rem; line-height: 1.4; font-weight: 700; margin-bottom: 20px; min-height: 100px;}
        .highlight { background: var(--royal-color); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stars, .hearts { position: absolute; inset: 0; pointer-events: none; }

        .reveal-frame { 
            position: relative; width: 100vw; height: 320px; margin: 25px 0; 
            background: #111; overflow: hidden; cursor: pointer; border-top: 1px solid #FFD700; border-bottom: 1px solid #FFD700;
        }
        .reveal-frame img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; filter: blur(50px); transition: 1.2s; }
        .reveal-frame.active img { filter: blur(0); }
        .tap-msg { position: absolute; inset:0; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 4px; color: #fff; background: rgba(0,0,0,0.4); }
        .reveal-frame.active .tap-msg { opacity: 0; }

        .s4-poetic { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; background: linear-gradient(to right, #ff758c, #ff7eb3, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; min-height: 80px;}

        .big-bday-wish { font-size: 1.8rem; font-family: 'Playfair Display', serif; font-weight: 900; background: var(--luxury-mix); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; min-height: 100px;}
        .nick-box { margin: 20px 0; opacity: 0; transition: 2s ease; }
        .nick-box.visible { opacity: 1; }
        .nick-box span { display: block; font-size: 2rem; font-weight: 900; margin: 5px 0; font-family: 'Playfair Display', serif; }
        .shimmer-end { font-size: 1.5rem; font-weight: 800; background: linear-gradient(45deg, #ff00cc, #3333ff, #ff00cc); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shim 3s infinite linear; min-height: 50px;}

        .signature-box h2 { font-family: 'Great Vibes', cursive; font-size: 4.5rem; background: var(--bright-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 15px; min-height: 100px; }

        @keyframes shim { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        
        /* Typewriter Cursor */
        .typing::after { content: '|'; animation: blinkCursor 0.8s infinite; color: gold; }
        @keyframes blinkCursor { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- 1️⃣ HERO (New Message + Fireworks) -->
    <section data-type="type-s1">
        <canvas id="fw-canvas"></canvas>
        <div class="media-bg" style="background-image: url('images/Handhold.jpg');"></div>
        <div class="content-wrap">
            <h1 class="s1-text typing" id="text-s1"></h1>
        </div>
    </section>

    <!-- 2️⃣ TEA -->
    <section data-type="type-s2">
        <div class="stars" id="star-layer"></div>
        <div class="media-bg" style="background-image: url('images/Tea.jpg');"></div>
        <h2 class="header-top-right">Chai aur Tum</h2>
        <div class="content-wrap">
            <p class="fill-text typing" id="text-s2"></p>
            <p class="fill-text highlight typing" id="text-s2-hl"></p>
        </div>
    </section>

    <!-- 3️⃣ TOGETHER -->
    <section data-type="type-s3">
        <div class="hearts" id="heart-layer"></div>
        <div class="media-bg" style="background-image: url('images/HandonHand.jpg');"></div>
        <div class="content-wrap">
            <p class="fill-text typing" id="text-s3"></p>
            <p class="fill-text highlight typing" id="text-s3-hl"></p>
        </div>
    </section>

    <!-- 4️⃣ HICKEY REVEAL -->
    <section data-type="type-s4">
        <div class="content-wrap">
            <p class="reveal-text" style="color:#FFD700; margin-bottom:10px;">“A private secret, meant only for us… 🌹”</p>
            <div class="reveal-frame" onclick="this.classList.toggle('active')">
                <img src="images/Hikkey.jpg">
                <div class="tap-msg">TAP TO UNLOCK MEMORY</div>
            </div>
            <p class="s4-poetic typing" id="text-s4"></p>
        </div>
    </section>

    <!-- 5️⃣ MEGA MESSAGE (Nicknames Reveal) -->
    <section data-type="type-s5">
        <div class="media-bg" style="background-image: url('images/Flower2.jpg'); opacity: 0.25;"></div>
        <div class="content-wrap">
            <h2 class="big-bday-wish typing" id="text-s5-title"></h2>
            
            <div class="nick-box" id="nick-reveal">
                <span style="color: #a1c4fd;">Mera Betu… 💙</span>
                <span style="color: #ffafbd;">Meri Shona… 💖</span>
                <span style="color: #ffd1dc;">Meri Lado… 🌹</span>
                <span style="color: #fff;">Mera Babu… 🤍</span>
                <span style="color: #ffd700;">Mera Sabkuch… 💍✨</span>
            </div>

            <div class="long-confession">
                <p class="typing" id="text-s5-p1" style="font-size:1.1rem; font-style:italic; margin-bottom:10px;"></p>
                <p class="shimmer-end typing" id="text-s5-p2"></p>
            </div>
        </div>
    </section>

    <!-- 6️⃣ SIGNATURE -->
    <section data-type="type-s6">
        <div class="content-wrap">
            <div class="reveal-frame" onclick="this.classList.toggle('active')">
                <img src="images/Name.jpg">
                <div class="tap-msg">REVEAL FOREVER</div>
            </div>
            <div class="signature-box">
                <p id="text-s6-msg" class="typing" style="font-size:1.5rem; color:gold;"></p>
                <h2 id="text-s6-name" class="typing"></h2>
            </div>
        </div>
    </section>

    <script>
        const MESSAGES = {
            "text-s1": `Wish you a very, very Happy Birthday, Baccha… 🎂💖✨\nAaj ka din mere liye sirf ek date nahi, ek ehsaas hai… 🌸\nTum ho toh meri duniya mein roshni hai, warna sab kuch adhura sa lagta hai… 💫\nMay life always hold you gently and give you more than you ever dream of… 🤍\nTum meri muskaan ho, meri dua ho, meri sabse khoobsurat wajah ho… 🌹\nStay happy, stay mine… always. 💞✨`,
            "text-s2": "चाय की वो छोटी सी प्याली, \n और सामने बैठी तुम… ☕🌸",
            "text-s2-hl": "तुम साथ हो, तो हर लम्हा खास है… 💖✨",
            "text-s3": "हाथों की ये पकड़ बस आज की नहीं… 🤍",
            "text-s3-hl": "मैं हमेशा तुम्हारे साथ रहूँगा… 💖✨",
            "text-s4": "ये बस एक निशान नहीं… मोहब्बत की वो अनकही कहानी है। 💞✨",
            "text-s5-title": "Wishing You a Very Very Happy Birthday, Baccha… 🎂❤️",
            "text-s5-p1": "Tum sirf meri mohabbat nahi ho… tum meri zarurat ho 💞 sukoon ho 🌙 dhadkan ho 💓 Aur shayad meri takdeer bhi… 🌟",
            "text-s5-p2": "I Love You beyond words. Bas tum hi ho. 🤍✨",
            "text-s6-msg": "हर जन्म में, बस तुम ही मेरी कहानी रहना… 💖",
            "text-s6-name": "Akki 🤍"
        };

        async function typewriter(id) {
            const el = document.getElementById(id);
            if (!el || el.dataset.ran) return;
            el.dataset.ran = "true";
            const text = MESSAGES[id];
            for (let i = 0; i < text.length; i++) {
                if (text[i] === "\n") el.innerHTML += "<br>";
                else el.innerHTML += text[i];
                await new Promise(r => setTimeout(r, 60));
            }
            el.classList.remove('typing');
            if (id === 'text-s5-title') document.getElementById('nick-reveal').classList.add('visible');
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const sectionType = entry.target.dataset.type;
                    if (sectionType === 'type-s1') typewriter('text-s1');
                    if (sectionType === 'type-s2') { typewriter('text-s2').then(() => typewriter('text-s2-hl')); }
                    if (sectionType === 'type-s3') { typewriter('text-s3').then(() => typewriter('text-s3-hl')); }
                    if (sectionType === 'type-s4') typewriter('text-s4');
                    if (sectionType === 'type-s5') { typewriter('text-s5-title').then(() => typewriter('text-s5-p1')).then(() => typewriter('text-s5-p2')); }
                    if (sectionType === 'type-s6') { typewriter('text-s6-msg').then(() => typewriter('text-s6-name')); }
                }
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('section').forEach(s => observer.observe(s));

        // FX ANIMATIONS (Remain Same)
        const canvas = document.getElementById('fw-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function fw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<4;i++){
                ctx.fillStyle = `hsl(${Math.random()*360},100%,70%)`;
                ctx.beginPath(); ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,1.2,0,Math.PI*2); ctx.fill();
            } requestAnimationFrame(fw);
        } fw();
    </script>
</body>
</html>
