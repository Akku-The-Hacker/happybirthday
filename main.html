<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Shona ❤️</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="fireworks"></canvas>

    <section class="section hero">
        <div class="overlay"></div>
        <div class="content">
            <h1>Happy Birthday Shona 💖</h1>
        </div>
    </section>

    <section class="section shayari">
        <div class="overlay"></div>
        <div class="content">
            <p>“Saja rakhi hain yaadein, bas tera intezaar hai… 💕”</p>
        </div>
    </section>

    <section class="section memory">
        <div class="overlay"></div>
        <div class="content">
            <h2>Tap to Reveal...</h2>
            <img src="images/Hikkey.jpg" class="blur-img" onclick="this.classList.toggle('reveal')">
        </div>
    </section>

    <section class="section signature">
        <div class="overlay"></div>
        <div class="content">
            <h2>Our Forever Story ❤️</h2>
            <p>– Yours, Akki</p>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
