<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Forever Story | Happy Birthday Shona</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

    <div id="gold-dust-container"></div>

    <main class="story-scroller">
        
        <!-- SECTION 1: ENTRANCE -->
        <section class="cinematic-section" id="section1" data-scene="hero">
            <div class="bg-layer" style="background-image: url('images/Handhold.jpg');"></div>
            <div class="overlay-layer rose-tint"></div>
            <div class="content-box bottom-align">
                <div class="typewriter-container" id="tw1"></div>
            </div>
        </section>

        <!-- SECTION 2: CHAI -->
        <section class="cinematic-section" id="section2" data-scene="tea">
            <div class="bg-layer" style="background-image: url('images/Tea.jpg');"></div>
            <div class="overlay-layer amber-tint"></div>
            <div class="steam-fx"><span></span><span></span><span></span></div>
            <div class="top-title">
                <h2 class="scene-heading gold-shimmer">Chai aur Tum</h2>
            </div>
            <div class="content-box">
                <div class="typewriter-container" id="tw2"></div>
            </div>
        </section>

        <!-- SECTION 3: TOGETHER -->
        <section class="cinematic-section" id="section3" data-scene="together">
            <div class="bg-layer" style="background-image: url('images/HandonHand.jpg');"></div>
            <div class="overlay-layer cool-shadow"></div>
            <div class="halo-effect"></div>
            <div class="content-box bottom-align">
                <div class="typewriter-container" id="tw3"></div>
            </div>
        </section>

        <!-- SECTION 4: HICKEY (HORIZONTAL PHOTO FIX) -->
        <section class="cinematic-section horizontal-fix" id="section4" data-scene="hickey">
            <!-- Blur Fill Background (Fixed Black Box) -->
            <div class="blur-fill-bg" style="background-image: url('images/Hikkey.jpg');"></div>
            <div class="overlay-layer crimson-tint"></div>
            
            <div class="content-box">
                <p class="spoiler-line">“A private secret, meant only for us… 🌹”</p>
                <!-- Border Image with Gradient Glow -->
                <div class="bordered-photo-wrapper" onclick="revealPhoto(this)">
                    <img src="images/Hikkey.jpg" class="main-photo hickey-blur">
                    <div class="tap-hint">TAP TO REVEAL</div>
                </div>
                <div class="typewriter-container" id="tw4"></div>
            </div>
        </section>

        <!-- SECTION 5: THE BIG WISH (FLOWER) -->
        <section class="cinematic-section" id="section5" data-scene="flower">
            <div class="bg-layer" style="background-image: url('images/Flower2.jpg');"></div>
            <div class="overlay-layer bloom-tint"></div>
            <div class="content-box center-align">
                <div class="typewriter-container mega-size" id="tw5"></div>
            </div>
        </section>

        <!-- SECTION 6: FINALE (HORIZONTAL FIX) -->
        <section class="cinematic-section horizontal-fix" id="section6" data-scene="closing">
            <div class="blur-fill-bg" style="background-image: url('images/Name.jpg');"></div>
            <div class="overlay-layer wine-tint"></div>
            <canvas id="fireworks-finale"></canvas>

            <div class="content-box">
                <p class="spoiler-line italic">“Our Forever Story ❤️”</p>
                <div class="bordered-photo-wrapper">
                    <img src="images/Name.jpg" class="main-photo">
                </div>
                <div class="typewriter-container" id="tw6"></div>
            </div>
        </section>

    </main>

    <script src="js/main.js"></script>
</body>
</html>
