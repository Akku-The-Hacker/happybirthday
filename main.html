<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Baccha | Akki</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="particles-overlay"></div>
    <canvas id="fw-canvas"></canvas>

    <main class="story-container">
        
        <!-- SECTION 1: HERO -->
        <section class="st-scene" data-id="s1">
            <div class="media-box" style="background-image: url('images/Handhold.jpg');"></div>
            <div class="content">
                <h1 id="tw1" class="mega-gold-shimmer"></h1>
            </div>
        </section>

        <!-- SECTION 2: TEA -->
        <section class="st-scene" data-id="s2">
            <div id="star-layer"></div>
            <div class="media-box" style="background-image: url('images/Tea.jpg');"></div>
            <h2 class="top-right-header">Chai aur Tum</h2>
            <div class="content flex-fill">
                <div id="tw2" class="screen-filler-style"></div>
            </div>
        </section>

        <!-- SECTION 3: TOGETHER -->
        <section class="st-scene" data-id="s3">
            <div id="heart-layer"></div>
            <div class="media-box" style="background-image: url('images/HandonHand.jpg');"></div>
            <div class="content flex-fill">
                <div id="tw3" class="screen-filler-style rose-color"></div>
            </div>
        </section>

        <!-- SECTION 4: HICKEY (IMAGE CENTER - TEXT BELOW) -->
        <section class="st-scene horiz-fit" data-id="s4">
            <div class="mirror-blur-bg" style="background-image: url('images/Hikkey.jpg');"></div>
            <div class="content vertical-stack">
                <p class="spoiler-tag">“A private secret, meant only for us... 🌹”</p>
                <div class="horizontal-reveal-frame" onclick="this.classList.toggle('unlocked')">
                    <img src="images/Hikkey.jpg">
                    <div class="mask">TAP TO REVEAL</div>
                </div>
                <div id="tw4" class="stylish-intimacy-msg"></div>
            </div>
        </section>

        <!-- SECTION 5: NICKNAMES (FLOWERS) -->
        <section class="st-scene" data-id="s5">
            <div class="media-box" style="background-image: url('images/Flower2.jpg'); opacity:0.3"></div>
            <div class="content text-start">
                <div id="tw5" class="nicknames-story"></div>
            </div>
        </section>

        <!-- SECTION 6: FINALE (SIGNATURE - AKKI) -->
        <section class="st-scene horiz-fit" data-id="s6">
            <div class="mirror-blur-bg" style="background-image: url('images/Name.jpg');"></div>
            <div class="content vertical-stack finale-box">
                <p class="spoiler-tag gold-glow-text">“Our Story is Infinite... ✨”</p>
                <div class="horizontal-reveal-frame" onclick="this.classList.toggle('unlocked')">
                    <img src="images/Name.jpg">
                    <div class="mask">UNLOCK FOREVER</div>
                </div>
                <div id="tw6" class="massive-finale-block"></div>
            </div>
        </section>

    </main>

    <script src="js/main.js"></script>
</body>
</html>
