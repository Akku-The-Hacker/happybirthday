<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting the Moments... ❤️</title>
    <link rel="stylesheet" href="css/countdown.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Cinematic Background -->
    <div class="bg-wrapper">
        <div class="bg-image"></div>
        <div class="overlay"></div>
    </div>

    <!-- Main Experience -->
    <main class="content-wrapper">
        
        <header class="top-text">
            <h2 class="fade-in">Wait for the Magic... ✨</h2>
        </header>

        <!-- Glass Countdown -->
        <div class="timer-container">
            <div class="timer-box">
                <span id="days">00</span>
                <p>Days 💕</p>
            </div>
            <div class="timer-box">
                <span id="hours">00</span>
                <p>Hours 💫</p>
            </div>
            <div class="timer-box">
                <span id="minutes">00</span>
                <p>Mins 🌸</p>
            </div>
            <div class="timer-box">
                <span id="seconds">00</span>
                <p>Secs ✨</p>
            </div>
        </div>

        <!-- Heartbeat Pulse Center -->
        <div class="heart-container">
            <div class="main-heart">❤️</div>
        </div>

        <!-- Dynamic Shayari System -->
        <div class="poetry-reveal">
            <p id="shayari-text" class="shimmer-text"></p>
        </div>

    </main>

    <script src="js/countdown.js"></script>
</body>
</html>
