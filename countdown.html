<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting the Moments...</title>
    <link rel="stylesheet" href="css/countdown.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hidden Debug Overlay (Use only if testing, remove for final) -->
    <div id="debug" style="display:none; color: red; position: fixed; top:0; z-index:1000; background:white;"></div>

    <div class="bg-wrapper">
        <div class="bg-image"></div>
        <div class="vignette"></div>
        <div class="overlay-grad"></div>
    </div>

    <!-- YouTube Music -->
    <div id="yt-player"></div>
    <button class="music-toggle" onclick="handleMusic()">
        <span id="music-state">🎵</span>
    </button>

    <main class="timer-viewport">
        <h1 class="header-text">Counting the moments until your day… 💖</h1>

        <div class="counter-row">
            <div class="time-part">
                <span id="days">00</span>
                <p>Days 💕</p>
            </div>
            <div class="blink-sep">:</div>
            <div class="time-part">
                <span id="hours">00</span>
                <p>Hours 💫</p>
            </div>
            <div class="blink-sep">:</div>
            <div class="time-part">
                <span id="minutes">00</span>
                <p>Mins 🌸</p>
            </div>
            <div class="blink-sep">:</div>
            <div class="time-part">
                <span id="seconds">00</span>
                <p>Secs ✨</p>
            </div>
        </div>

        <div class="bottom-soul">
            <p class="emotional-sub">Every second brings me closer to celebrating you… 💫</p>
            <p id="shayari-text" class="shimmer"></p>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/countdown.js"></script>
</body>
</html>
