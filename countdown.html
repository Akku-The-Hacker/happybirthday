<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting the Moments...</title>
    <link rel="stylesheet" href="css/countdown.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="player"></div> <!-- YouTube Music -->
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <button class="music-toggle" onclick="toggleMusic()">🎵</button>

    <main class="timer-viewport">
        <h1 class="fade-up">Counting the moments until your day… 💖</h1>

        <div class="hindi-line">
            “तेरा कुछ पल का आना… 🌸<br>
            मुझे हर पल तेरा कर जाता है 💖✨”
        </div>

        <div class="timer-display">
            <div class="unit"><span id="days">--</span><p>Days 💕</p></div>
            <div class="sep">:</div>
            <div class="unit"><span id="hours">--</span><p>Hours 💫</p></div>
            <div class="sep">:</div>
            <div class="unit"><span id="minutes">--</span><p>Mins 🌸</p></div>
            <div class="sep">:</div>
            <div class="unit"><span id="seconds">--</span><p>Secs ✨</p></div>
        </div>

        <div class="shimmer-area">
            <p id="shayari-text" class="shimmer"></p>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/countdown.js"></script>
</body>
</html>
